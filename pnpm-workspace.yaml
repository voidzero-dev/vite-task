packages:
  - .
  - packages/tools

# Support both macOS and Windows ARM64 for shared folder usage
supportedArchitectures:
  os:
    - current
    - win32
  cpu:
    - current
    - arm64

catalog:
  '@types/node': 25.0.3
  husky: ^9.1.7
  lint-staged: ^16.2.6
  oxlint: ^1.34.0
  oxlint-tsgolint: ^0.10.0

catalogMode: prefer

minimumReleaseAge: 1440

minimumReleaseAgeExclude: null
