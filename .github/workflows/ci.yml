name: CI

permissions:
  # Doing it explicitly because the default permission only includes metadata: read.
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

defaults:
  run:
    shell: bash

jobs:
  test-musl:
    name: Test (musl)
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine3.21
      options: --shm-size=256m # shm_io tests need bigger shared memory
    env:
      # Override all rustflags to skip the zig cross-linker from .cargo/config.toml.
      # Alpine's cc is already musl-native, so no custom linker is needed.
      # Must mirror [build].rustflags from .cargo/config.toml.
      RUSTFLAGS: --cfg tokio_unstable -D warnings
    steps:
      - name: Install Alpine dependencies
        shell: sh {0}
        run: apk add --no-cache bash curl git musl-dev gcc g++ python3 binutils

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          submodules: true

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: rustup show

      - name: Install pnpm and Node tools
        run: |
          corepack enable
          pnpm install

      - name: Run pty_terminal_test
        run: cargo test -p pty_terminal_test

      - name: Repeat milestone binary to reproduce flaky SIGSEGV
        run: |
          milestone=$(find target/debug/deps -name 'milestone-*' -executable -type f)
          echo "=== Test A: parallel (default) ==="
          for i in $(seq 1 500); do
            output=$("$milestone" --quiet 2>&1) || {
              echo "CRASHED (parallel) on iteration $i"
              echo "$output"
              # Extract addresses and resolve with addr2line
              # Find binary base address (first r--p mapping with offset 0)
              base=$(echo "$output" | grep "$(basename "$milestone")" | grep 'r--p 00000000' | head -1 | awk '{print $1}' | cut -d- -f1)
              echo "Binary base: 0x$base"
              # Resolve all backtrace addresses
              echo "=== addr2line resolution ==="
              echo "$output" | grep -oP '0x[0-9a-f]+' | while read addr; do
                if [ -n "$base" ]; then
                  offset=$(printf "0x%x" $(($addr - 0x$base)))
                  result=$(addr2line -e "$milestone" -f -C "$offset" 2>/dev/null)
                  if echo "$result" | grep -qv '??'; then
                    echo "$addr (offset $offset): $result"
                  fi
                fi
              done
              exit 1
            }
          done
          echo "All 500 parallel iterations passed"

      - name: Repeat milestone binary single-threaded
        if: always()
        run: |
          milestone=$(find target/debug/deps -name 'milestone-*' -executable -type f)
          echo "=== Test B: single-threaded ==="
          for i in $(seq 1 500); do
            "$milestone" --quiet --test-threads=1 2>&1 || { echo "CRASHED (single-threaded) on iteration $i"; exit 1; }
          done
          echo "All 500 single-threaded iterations passed"
