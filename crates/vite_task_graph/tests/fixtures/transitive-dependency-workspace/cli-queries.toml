[[query]]
name = "simple task by name"
cwd = "packages/a"
args = ["build"]

[[query]]
name = "under subfolder of package"
cwd = "packages/a/src"
args = ["build"]

[[query]]
name = "explicit package name under different package"
cwd = "packages/a"
args = ["@test/c#build"]

[[query]]
name = "explicit package name under non-package cwd"
cwd = ""
args = ["@test/c#build"]

[[query]]
name = "ambiguous task name"
cwd = ""
args = ["@test/a#build"]

[[query]]
name = "ignore depends on"
cwd = "packages/a"
args = ["--ignore-depends-on", "build"]

[[query]]
name = "transitive"
cwd = "packages/a"
args = ["--transitive", "build"]

[[query]]
name = "transitive in package without the task"
cwd = "packages/a"
args = ["--transitive", "lint"]

[[query]]
name = "transitive non existent task"
cwd = "packages/a"
args = ["--transitive", "non-existent-task"]

[[query]]
name = "recursive"
cwd = ""
args = ["--recursive", "build"]

[[query]]
name = "recursive and transitive"
cwd = ""
args = ["--recursive", "--transitive", "build"]
