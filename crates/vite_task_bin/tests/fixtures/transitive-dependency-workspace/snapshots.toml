[[plan]]
name = "simple task by name"
cwd = "packages/a"
args = ["run", "build"]

[[plan]]
name = "under subfolder of package"
cwd = "packages/a/src"
args = ["run", "build"]

[[plan]]
name = "explicit package name under different package"
cwd = "packages/a"
args = ["run", "@test/c#build"]

[[plan]]
name = "explicit package name under non-package cwd"
cwd = ""
args = ["run", "@test/c#build"]

[[plan]]
name = "ambiguous task name"
cwd = ""
args = ["run", "@test/a#build"]

[[plan]]
name = "ignore depends on"
cwd = "packages/a"
args = ["run", "--ignore-depends-on", "build"]

[[plan]]
name = "transitive"
cwd = "packages/a"
args = ["run", "--transitive", "build"]

[[plan]]
name = "transitive in package without the task"
cwd = "packages/a"
args = ["run", "--transitive", "lint"]

[[plan]]
name = "transitive non existent task"
cwd = "packages/a"
args = ["run", "--transitive", "non-existent-task"]

[[plan]]
name = "recursive"
cwd = ""
args = ["run", "--recursive", "build"]

[[plan]]
name = "recursive and transitive"
cwd = ""
args = ["run", "--recursive", "--transitive", "build"]
