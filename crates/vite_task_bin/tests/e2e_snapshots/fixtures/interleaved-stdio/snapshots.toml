# Tests stdio behavior in interleaved mode (default --log mode).
#
# In interleaved mode:
# - cache off  → all stdio inherited (stdin from parent, stdout/stderr to terminal)
# - cache on   → stdin is /dev/null, stdout/stderr are piped (for capture/replay)
#
# This applies identically regardless of task count.
#
# `check-tty` prints whether each stdio fd is a TTY.
# `read-stdin` reads one line from stdin and prints it.

# ─── stdout/stderr: cache off → inherited (tty) ─────────────────

[[e2e]]
name = "single task, cache off, inherits stdio"
steps = ["vt run check-tty"]

[[e2e]]
name = "multiple tasks, cache off, inherit stdio"
steps = ["vt run -r check-tty"]

# ─── stdout/stderr: cache on, miss → piped (not-tty) ────────────

[[e2e]]
name = "single task, cache miss, piped stdio"
steps = ["vt run check-tty-cached"]

[[e2e]]
name = "multiple tasks, cache miss, piped stdio"
steps = ["vt run -r check-tty-cached"]

# ─── stdout/stderr: cache on, hit → replayed ────────────────────

[[e2e]]
name = "single task, cache hit, replayed"
steps = ["vt run check-tty-cached", "vt run check-tty-cached"]

[[e2e]]
name = "multiple tasks, cache hit, replayed"
steps = ["vt run -r check-tty-cached", "vt run -r check-tty-cached"]

# ─── stdin: cache off → inherited ───────────────────────────────

[[e2e]]
name = "cache off inherits stdin"
steps = ["echo from-stdin | vt run read-stdin"]

# ─── stdin: cache on → null ─────────────────────────────────────

[[e2e]]
name = "cache on gets null stdin"
steps = ["echo from-stdin | vt run read-stdin-cached"]
