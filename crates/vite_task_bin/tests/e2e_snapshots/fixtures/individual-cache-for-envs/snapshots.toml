# Tests that different env values get separate cache entries

[[e2e]]
name = "individual cache for envs"
steps = [
  "FOO=1 vp run --details hello # cache miss",
  "FOO=2 vp run --details hello # cache miss, different env",
  "FOO=1 vp run --details hello # cache hit",
  "FOO=2 vp run --details hello # cache hit",
]
