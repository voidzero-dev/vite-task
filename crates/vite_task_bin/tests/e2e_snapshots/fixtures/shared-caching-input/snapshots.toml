# Tests that tasks with identical commands share cache entries

[[e2e]]
name = "shared caching input"
steps = [
  "vp run script1 # cache miss",
  "vp run script2 # cache hit, same command as script1",
  "replace-file-content foo.txt initial modified # modify shared input",
  "vp run script2 # cache miss, input changed",
  "vp run script1 # cache hit, script2 already warmed cache",
]
