# Tests that user task named "lint" doesn't conflict with builtin lint

[[e2e]]
name = "same name as builtin"
steps = [
  "vite lint # runs builtin oxlint",
  "vite run lint # runs user-defined lint script",
  "echo 'console.log(1);' > a.js # add valid JS file",
  "vite lint # builtin lint: cache miss",
  "vite run lint # user lint: cache miss",
]
