# Test all cache miss reason variants

[[e2e]]
name = "env value changed"
steps = [
  "cross-env MY_ENV=1 vp run --verbose test # cache miss",
  "cross-env MY_ENV=2 vp run --verbose test # cache miss: env value changed",
]

[[e2e]]
name = "env added"
steps = [
  "vp run --verbose test # cache miss",
  "cross-env MY_ENV=1 vp run --verbose test # cache miss: env added",
]

[[e2e]]
name = "env removed"
steps = [
  "cross-env MY_ENV=1 vp run --verbose test # cache miss",
  "vp run --verbose test # cache miss: env removed",
]

[[e2e]]
name = "pass-through env added"
steps = [
  "vp run --verbose test # cache miss",
  "json-edit vite-task.json \"_.tasks.test.passThroughEnvs = ['MY_PASSTHROUGH']\" # add pass-through env",
  "vp run --verbose test # cache miss: pass-through env added",
]

[[e2e]]
name = "pass-through env removed"
steps = [
  "json-edit vite-task.json \"_.tasks.test.passThroughEnvs = ['MY_PASSTHROUGH']\" # setup",
  "vp run --verbose test # cache miss",
  "json-edit vite-task.json \"delete _.tasks.test.passThroughEnvs\" # remove pass-through env",
  "vp run --verbose test # cache miss: pass-through env removed",
]

[[e2e]]
name = "cwd changed"
steps = [
  "vp run --verbose test # cache miss",
  "mkdir -p subfolder",
  "cp test.txt subfolder/test.txt",
  "json-edit vite-task.json \"_.tasks.test.cwd = 'subfolder'\" # change cwd",
  "vp run --verbose test # cache miss: cwd changed",
]

[[e2e]]
name = "input content changed"
steps = [
  "vp run --verbose test # cache miss",
  "replace-file-content test.txt initial modified # modify input",
  "vp run --verbose test # cache miss: input changed",
]
