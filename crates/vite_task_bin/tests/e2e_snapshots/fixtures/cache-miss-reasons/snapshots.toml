# Test all cache miss reason variants

[[e2e]]
name = "env value changed"
steps = [
  "cross-env MY_ENV=1 vp run test # cache miss",
  "cross-env MY_ENV=2 vp run test # cache miss: env value changed",
]

[[e2e]]
name = "env added"
steps = [
  "vp run test # cache miss",
  "cross-env MY_ENV=1 vp run test # cache miss: env added",
]

[[e2e]]
name = "env removed"
steps = [
  "cross-env MY_ENV=1 vp run test # cache miss",
  "vp run test # cache miss: env removed",
]

[[e2e]]
name = "untracked env added"
steps = [
  "vp run test # cache miss",
  "json-edit vite-task.json \"_.tasks.test.untrackedEnv = ['MY_UNTRACKED']\" # add untracked env",
  "vp run test # cache miss: untracked env added",
]

[[e2e]]
name = "untracked env removed"
steps = [
  "json-edit vite-task.json \"_.tasks.test.untrackedEnv = ['MY_UNTRACKED']\" # setup",
  "vp run test # cache miss",
  "json-edit vite-task.json \"delete _.tasks.test.untrackedEnv\" # remove untracked env",
  "vp run test # cache miss: untracked env removed",
]

[[e2e]]
name = "cwd changed"
steps = [
  "vp run test # cache miss",
  "mkdir -p subfolder",
  "cp test.txt subfolder/test.txt",
  "json-edit vite-task.json \"_.tasks.test.cwd = 'subfolder'\" # change cwd",
  "vp run test # cache miss: cwd changed",
]

[[e2e]]
name = "inferred input changes"
steps = [
  "vp run test # cache miss",
  "replace-file-content test.txt initial modified # modify input",
  "vp run test # cache miss: input modified",
  "rm test.txt # remove tracked input",
  "vp run test # cache miss: input removed",
  "echo new content > test.txt # recreate previously removed file",
  "vp run test # cache miss: input added",
]

[[e2e]]
name = "input config changed"
steps = [
  "vp run test # cache miss",
  "json-edit vite-task.json \"_.tasks.test.input = ['test.txt']\" # change input config",
  "vp run test # cache miss: configuration changed",
]

[[e2e]]
name = "glob input changes"
steps = [
  "vp run glob-test # cache miss",
  "replace-file-content test.txt initial modified # modify glob input",
  "vp run glob-test # cache miss: input modified",
  "echo new content > new.txt # add a new .txt file",
  "vp run glob-test # cache miss: input added",
  "rm extra.txt # remove a .txt file",
  "vp run glob-test # cache miss: input removed",
]
