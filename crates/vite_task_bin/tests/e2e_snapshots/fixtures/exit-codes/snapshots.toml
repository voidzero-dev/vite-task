# Tests exit code behavior for task failures

[[e2e]]
name = "single task failure returns task exit code"
steps = [
  "vt run pkg-a#fail # exits with code 42",
]

[[e2e]]
name = "multiple task failures returns exit code 1"
# --concurrency=1: deterministic output ordering for snapshot stability
steps = [
  "vt run -r fail --concurrency=1 # multiple failures -> exit code 1",
]
