# Tests exit code behavior for task failures

[[e2e]]
name = "single task failure returns task exit code"
steps = [
  "vt run pkg-a#fail # exits with code 42",
]

[[e2e]]
name = "recursive failure fast-fails and returns task exit code"
# --concurrency=1: deterministic execution order for snapshot stability
steps = [
  "vt run -r fail --concurrency=1 # fast-fail: only first failure runs",
]
